name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max-old-space-size=6144"

jobs:
  # ── Scope detection (skip heavy jobs for docs-only changes) ──
  changed-scope:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.detect.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
          else
            BASE="origin/${{ github.event.pull_request.base.ref }}"
          fi
          CHANGED=$(git diff --name-only "$BASE"..HEAD 2>/dev/null || echo "")
          if echo "$CHANGED" | grep -qvE '^(docs/|README\.md|\.github/.*\.md)'; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Quality checks (lint + typecheck + format + knip) ──
  check:
    name: Check
    runs-on: ubuntu-latest
    needs: [changed-scope]
    if: needs.changed-scope.outputs.code_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm knip

  # ── Build artifacts (shared across test jobs) ──
  build-artifacts:
    name: Build
    runs-on: ubuntu-latest
    needs: [changed-scope]
    if: needs.changed-scope.outputs.code_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist/
          retention-days: 1

  # ── Unit tests ──
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [check]
    env:
      OPENOCTOPUS_TEST_WORKERS: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit -- --run

  # ── Integration tests ──
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [check]
    env:
      OPENOCTOPUS_TEST_WORKERS: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration -- --run

  # ── E2E smoke test (main/tags only) ──
  e2e:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: [build-artifacts, test-unit]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages/
      - name: Smoke test gateway
        run: |
          node packages/ink/dist/index.js serve &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:19790/healthz | grep -q '"status":"ok"'
          curl -sf http://localhost:19789/healthz | grep -q '"status":"ok"'
          kill $SERVER_PID || true
