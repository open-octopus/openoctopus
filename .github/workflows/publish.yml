name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

      - run: pnpm test:unit -- --run

      - name: Build workspace packages + root bundle
        run: pnpm build && pnpm build:dist

      - name: Verify bundle
        run: |
          test -f dist/cli.mjs || { echo "dist/cli.mjs missing"; exit 1; }
          test -f dist/gateway.mjs || { echo "dist/gateway.mjs missing"; exit 1; }
          node openoctopus.mjs --help

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
